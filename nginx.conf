# nginx config for serving the Flutter web build (single-page app).
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA history-mode fallback: unknown paths return index.html so client-side
    # routing works on refresh/deep-link.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the entry point or the service worker — they must always be
    # fetched fresh so new deployments are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Hashed/static assets can be cached aggressively.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|wasm|json)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Basic gzip to shrink the (large) Flutter JS payload over the wire.
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;
}
