name: Release

# Triggered by pushing a version tag, e.g.  git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    name: Build & Publish Signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create a GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests (gate the release)
        run: flutter test

      # Derive versionName + versionCode from the vMAJOR.MINOR.PATCH tag so we
      # never hand-edit pubspec for a release. versionCode must be monotonic for
      # Google Play; MAJOR*1e6 + MINOR*1e3 + PATCH guarantees that for semver.
      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          CODE=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Release $TAG -> versionName=$TAG versionCode=$CODE"

      # --- Signing: secrets are configured under Settings > Secrets and variables > Actions ---
      # KEYSTORE_BASE64  : base64 of your upload-keystore.jks  (base64 -w0 upload-keystore.jks)
      # STORE_PASSWORD   : keystore password
      # KEY_PASSWORD     : key password
      # KEY_ALIAS        : key alias (e.g. upload)
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      # GitHub-channel APKs: keep the in-app GitHub update check (sideload /
      # Obtainium users rely on it). FEATHERLOG_DISTRIBUTION=github is also the
      # default, but set it explicitly so the channel is unambiguous.
      - name: Build signed APK (per-ABI for smaller downloads)
        run: >-
          flutter build apk --release --split-per-abi
          --build-name=${{ steps.version.outputs.name }}
          --build-number=${{ steps.version.outputs.code }}
          --dart-define=FEATHERLOG_DISTRIBUTION=github
          --obfuscate --split-debug-info=build/symbols

      # App Bundle for Google Play (Play requires an .aab, not an APK). Built
      # with FEATHERLOG_DISTRIBUTION=play, which tree-shakes the GitHub
      # update-check feature out (Play policy: no off-Play update prompts).
      - name: Build signed App Bundle (Google Play)
        run: >-
          flutter build appbundle --release
          --build-name=${{ steps.version.outputs.name }}
          --build-number=${{ steps.version.outputs.code }}
          --dart-define=FEATHERLOG_DISTRIBUTION=play
          --obfuscate --split-debug-info=build/symbols

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
            sbom.spdx.json
          generate_release_notes: true # auto-changelog from merged PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Clean up secrets from the runner workspace (defensive)
      - name: Cleanup signing material
        if: always()
        run: rm -f android/app/upload-keystore.jks android/key.properties
