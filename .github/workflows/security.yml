name: Security

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly Monday scan, catches newly-disclosed CVEs

permissions:
  contents: read
  security-events: write # required to upload SARIF results to the Security tab

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
      - name: Review dependencies for known vulnerabilities
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  filesystem-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run Trivy vulnerability scanner
        # Pinned to a release tag (not @master): @master's default Trivy CLI
        # version briefly pointed at an unpublished release, breaking the scan.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true # don't fail the scan if the Security tab is briefly unavailable
        with:
          sarif_file: trivy-results.sarif
